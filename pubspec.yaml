name: Flumi
description: "Déjate llevar por la corriente."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Base de datos local offline-first (SQLite vía Drift) ---
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # --- Backend / nube ---
  supabase_flutter: ^2.5.6

  # --- Conectividad ---
  connectivity_plus: ^6.0.3

  # --- Identificadores únicos generados en cliente ---
  uuid: ^4.4.0

  # --- Mapas offline-friendly (OSM, sin Google Maps) ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # --- Persistencia simple ---
  shared_preferences: ^2.2.3

  # --- UI ---
  cupertino_icons: ^1.0.6
  curved_navigation_bar: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.20.2
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
